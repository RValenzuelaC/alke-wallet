<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Wallet - Depositar</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
			integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
			crossorigin="anonymous"
		/>
		<link rel="stylesheet" href="../assets/css/style.css" />
	</head>
	<body>
		<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
			<div class="container-fluid">
				<a class="navbar-brand">Alke Wallet</a>
				<button
					class="navbar-toggler"
					type="button"
					data-toggle="collapse"
					data-target="#navbarNav"
				>
					<span class="navbar-toggler-icon"></span>
				</button>

				<div
					class="collapse navbar-collapse justify-content-end"
					id="navbarNav"
				>
					<ul class="navbar-nav">
						<li class="nav-item">
							<a class="btn btn-dark w-100 py-2" href="../menu/menu.html"
								>Menú Principal</a
							>
						</li>
						<li class="nav-item">
							<a
								class="btn btn-dark w-100 py-2"
								href="../movimientos-dinero/sendmoney.html"
								>Enviar Dinero</a
							>
						</li>
						<li class="nav-item">
							<a
								class="btn btn-dark w-100 py-2"
								href="../movimientos-dinero/transactions.html"
								>Últimos Movimientos</a
							>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="../login/login.html">Cerrar Sesión</a>
						</li>
					</ul>
				</div>
			</div>
		</nav>

		<div class="container mt-3">
			<div id="mensaje"></div>
		</div>

		<div
			class="container-fluid d-flex align-items-center justify-content-center mt-4"
		>
			<div class="col-12 col-lg-5 col-xl-4 d-flex justify-content-center">
				<div class="card bg-dark text-white p-4 shadow-lg w-100">
					<h1 class="h1-login mb-4">Depositar</h1>

					<form>
						<div class="form-group mb-4">
							<label for="depositAmount">Monto a depositar:</label>
							<input
								type="number"
								class="form-control"
								id="depositAmount"
								placeholder="Ingrese el monto"
							/>
						</div>

						<div class="d-flex flex-column gap-3">
							<button
								id="btnDepositar"
								type="submit"
								class="btn btn-primary-login w-100 py-2 mb-2"
							>
								Realizar depósito
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>

		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
		<script src="../assets/js/deposit.js"></script>
	</body>
</html>
