<!doctype html>
<html>
	<head>
		<title>Wallet - Login</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
			integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
			crossorigin="anonymous"
		/>

		<link rel="stylesheet" href="../assets/css/style.css" />
	</head>
	<body>
		<div class="container-fluid min-vh-100">
			<div class="row min-vh-100 align-items-center">
				<!-- Estructura para el texto al lado del login -->
				<div
					class="col-12 col-lg-7 col-xl-8 text-white text-center text-lg-left mb-5 mb-lg-0"
				>
					<h1 class="display-4 font-weight-bold">
						Ingresa a tu billetera Digital
					</h1>

					<p class="lead mt-4">
						Gestiona tus finanzas de forma simple, rápida y segura.
					</p>

					<p>
						Realiza transferencias, consulta tus movimientos y mantén el control
						de tu dinero desde cualquier lugar.
					</p>
				</div>

				<!-- estructura del login -->
				<div class="col-12 col-lg-5 col-xl-4 d-flex justify-content-center">
					<div class="card card-login bg-dark text-white p-4 shadow-lg">
						<div id="mensaje" class="mt-3"></div>

						<h1 class="h1-login">Login</h1>

						<form>
							<div class="form-group">
								<label for="usuario">Usuario:</label>
								<i class="icon">👤</i>

								<input
									type="text"
									class="form-control"
									id="usuario"
									placeholder="Ingrese su usuario"
								/>
							</div>

							<div class="form-group">
								<label for="password">Contraseña:</label>
								<i class="icon">🔒</i>

								<input
									type="password"
									class="form-control"
									id="password"
									placeholder="Ingrese su contraseña"
								/>
							</div>

							<button
								id="submit"
								type="submit"
								class="btn btn-primary-login w-100"
							>
								Entrar
							</button>
						</form>
					</div>
				</div>
			</div>
		</div>
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
			crossorigin="anonymous"
		></script>
		<script src="../assets/js/login.js"></script>
	</body>
</html>
